# HexTacticsStore config
# Plaats in plugins/HexTacticsStore/config.yml
# Deze config stuurt shop, alerts, joins/leaves, deaths/stats en online status naar Discord.

server:
  port: 4567
  bind: "0.0.0.0"

security:
  # Verander dit naar een lange geheime token.
  # Zet deze token ook in je worker environment als PLUGIN_API_TOKEN.
  api-token: "CHANGE_THIS_LONG_SECRET_TOKEN"

discord:
  enabled: true
  # Maak webhooks in deze Discord kanalen:
  # shop-orders, alerts, joins-leaves, player-stats, online-status
  shop-webhook-url: "CHANGE_THIS_SHOP_ORDERS_WEBHOOK"
  alerts-webhook-url: "CHANGE_THIS_ALERTS_WEBHOOK"
  joins-webhook-url: "CHANGE_THIS_JOINS_LEAVES_WEBHOOK"
  stats-webhook-url: "CHANGE_THIS_PLAYER_STATS_WEBHOOK"
  online-webhook-url: "CHANGE_THIS_ONLINE_STATUS_WEBHOOK"
  # Elke 15 minuten online spelers + TPS naar Discord.
  # Zet op 0 om uit te schakelen.
  online-status-interval-minutes: 15

messages:
  prefix: "&5&lHexTactics &8» &7"
  delivered: "&aJe aankoop is geleverd: &e{product}"
  no-permission: "&cJe hebt geen permissie."

products:
  vip:
    display-name: "VIP Rank - 30 dagen"
    commands:
      - "lp user {player} parent settemp vip 30d"
      - "broadcast &a{player} heeft VIP gekocht op HexTactics!"
  elite:
    display-name: "Elite Rank - 30 dagen"
    commands:
      - "lp user {player} parent settemp elite 30d"
      - "broadcast &b{player} heeft Elite gekocht op HexTactics!"
  legend:
    display-name: "Legend Rank - 30 dagen"
    commands:
      - "lp user {player} parent settemp legend 30d"
      - "broadcast &6{player} heeft Legend gekocht op HexTactics!"
  keys_3:
    display-name: "3 Premium Crate Keys"
    commands:
      - "crate key give {player} premium 3"
  pvp_bundle:
    display-name: "PvP Bundle"
    commands:
      - "give {player} diamond_sword 1"
      - "give {player} shield 1"
      - "give {player} golden_apple 8"
  coins_50k:
    display-name: "50.000 Coins"
    commands:
      - "eco give {player} 50000"

# HexTactics Geyser/Floodgate notes
# Gebruik dit als checklist voor plugins/Geyser-Spigot/config.yml

bedrock:
  # Standaard Bedrock poort
  address: 0.0.0.0
  port: 19132
  clone-remote-port: false

remote:
  # Bij een normale Paper server op dezelfde machine:
  address: 127.0.0.1
  port: 25565
  auth-type: floodgate

server-name: "HexTactics"
motd1: "HexTactics"
motd2: "Tactical Survival"

# Aanrader voor Floodgate usernames:
# prefix: "."
# Voorbeeld Bedrock speler: .Steve

# Belangrijk:
# 1. Installeer Geyser-Spigot.jar
# 2. Installeer floodgate-spigot.jar
# 3. Start server 1x
# 4. Check of plugins/Geyser-Spigot/key.pem bestaat
# 5. Check config remote.auth-type: floodgate
